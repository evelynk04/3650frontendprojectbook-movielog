<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-F3w7mX95PdgyTmZZMECAngseQB83DfGTowi0iMjiWaeVhAn4FJkqJByhZMI3AhiU" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Book/Movie Log</title>
    <link rel="stylesheet" href="style.css"> 
    <script src="script.js" defer></script>  
</head>
<body>
    <div class="grid-container">
        <header class="header">
            <h1>Book/Movie Log</h1>
            <p>Track your reading and viewing progress</p>
        </header>

        <aside class="sidebar">
            <!-- Search -->
            <section class="search-form">
                <form id="search-form">
                    <div class="mb-3">
                        <input type="text" class="form-control" id="search-input" placeholder="Search by title, author/director, or genre">
                        <button type="submit" class="btn btn-secondary mt-2 w-100">
                            <i class="fas fa-search me-1"></i> Search
                        </button>
                    </div>
                </form>
            </section>

            <!-- Sort -->
            <section class="sort-form">
                <label for="sort-select" class="form-label">Sort by:</label>
                <select class="form-select" id="sort-select">
                    <option value="title">Title</option>
                    <option value="year">Year</option>
                    <option value="author">Author</option>
                    <option value="genre">Genre</option>
                    <option value="status">Status</option>
                </select>
            </section>

            <!-- Group -->
            <section class="group-form">
                <label for="group-mode" class="form-label">
                    <i class="fas fa-layer-group me-1" style="color:#667eea"></i> Group books by:
                </label>
                <select class="form-select" id="group-mode">
                    <option value="none">No grouping</option>
                    <option value="series">Series / Sequel</option>
                    <option value="author">Author</option>
                </select>
            </section>

            <!-- Add Book form -->
            <section class="add-book-form">
                <h2><i class="fas fa-book me-2"></i>Add a Book</h2>
                <form id="book-form">
                    <div class="mb-3">
                        <label for="book-title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="book-title" required>
                    </div>
                    <div class="mb-3">
                        <label for="book-author" class="form-label">Author</label>
                        <input type="text" class="form-control" id="book-author" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-7">
                            <label for="book-genre" class="form-label">Genre</label>
                            <input type="text" class="form-control" id="book-genre" required>
                        </div>
                        <div class="col-5">
                            <label for="book-year" class="form-label">Year</label>
                            <input type="number" class="form-control" id="book-year" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="book-rating" class="form-label">Rating (0–5)</label>
                        <input type="number" class="form-control" id="book-rating" min="0" max="5" step="0.5">
                    </div>

                    <!--Series/Group field-->
                    <div class="mb-3">
                        <label for="book-group" class="form-label">
                            Series / Group <span class="text-muted" style="font-size:0.8em">(optional)</span>
                        </label>
                        <input type="text" class="form-control" id="book-group" placeholder="e.g. Harry Potter, Dune Series">
                    </div>
                    <div class="mb-3">
                        <label for="book-status" class="form-label">Status</label>
                        <select class="form-select" id="book-status" required>
                            <option value="" disabled selected>Select status</option>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-plus me-1"></i> Add Book
                    </button>
                </form>
            </section>

            <!-- Add Movie form -->
            <section class="add-movie-form">
                <h2><i class="fas fa-film me-2"></i>Add a Movie</h2>
                <form id="movie-form">
                    <div class="mb-3">
                        <label for="movie-title" class="form-label">Title</label>
                        <input type="text" class="form-control" id="movie-title" required>
                    </div>
                    <div class="mb-3">
                        <label for="movie-director" class="form-label">Director</label>
                        <input type="text" class="form-control" id="movie-director" required>
                    </div>
                    <div class="row g-2 mb-3">
                        <div class="col-7">
                            <label for="movie-genre" class="form-label">Genre</label>
                            <input type="text" class="form-control" id="movie-genre" required>
                        </div>
                        <div class="col-5">
                            <label for="movie-year" class="form-label">Year</label>
                            <input type="number" class="form-control" id="movie-year" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="movie-rating" class="form-label">Rating (0–5)</label>
                        <input type="number" class="form-control" id="movie-rating" min="0" max="5" step="0.5">
                    </div>
                    <div class="mb-3">
                        <label for="movie-status" class="form-label">Status</label>
                        <select class="form-select" id="movie-status" required>
                            <option value="" disabled selected>Select status</option>
                            <option value="Not Started">Not Started</option>
                            <option value="In Progress">In Progress</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-plus me-1"></i> Add Movie
                    </button>
                </form>
            </section>
        </aside>

        <main class="main-content">
            <!-- Books -->
            <section class="book-list">
                <h2><i class="fas fa-book"></i> Books</h2>
                <div id="book-list-container" class="list-container"></div>
            </section>

            <!-- Book Groups -->
            <section class="book-groups-section" id="book-groups-section">
                <h2><i class="fas fa-layer-group"></i> Book Groups</h2>
                <div id="book-groups-container"></div>
            </section>

            <!-- Movies -->
            <section class="movie-list">
                <h2><i class="fas fa-film"></i> Movies</h2>
                <div id="movie-list-container" class="list-container"></div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</body>
</html>
